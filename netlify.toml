# ── Redirects ────────────────────────────────────────────────────────────────

# Favicon (browsers probe /favicon.ico regardless of <link> tags)
[[redirects]]
  from = "/favicon.ico"
  to = "/brand_assets/favicon-32.png"
  status = 301

# Sitemap variant crawlers expect
[[redirects]]
  from = "/sitemap_index.xml"
  to = "/sitemap.xml"
  status = 301

