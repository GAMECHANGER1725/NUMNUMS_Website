# Canonical host: force www → non-www and http → https onto the single
# canonical origin. GSC showed the homepage split across https://…/ (pos 14.74)
# and http://www…/ (pos 7.76); these consolidate the ranking signal onto one URL.
# NOTE: also confirm in Netlify dashboard → Domain management that the primary
# domain is "numnumsbakery.com.au" (non-www) with "Force HTTPS" enabled.
[[redirects]]
  from = "https://www.numnumsbakery.com.au/*"
  to = "https://numnumsbakery.com.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.numnumsbakery.com.au/*"
  to = "https://numnumsbakery.com.au/:splat"
  status = 301
  force = true

